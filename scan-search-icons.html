<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>搜索图标 — 外环旋转 + 内波</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f2ed;
  color: #2c2824;
  padding: 40px 24px;
}
h1 { text-align: center; font-weight: 500; font-size: 1.5rem; color: #4a3f35; margin-bottom: 4px; }
.sub { text-align: center; color: #8a7a6a; font-size: .85rem; margin-bottom: 36px; }

.gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 28px;
  justify-content: center;
  max-width: 960px;
  margin: 0 auto;
}
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px) saturate(1.4);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 20px;
  padding: 24px 20px 18px;
  text-align: center;
  width: 230px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
.card.selected { outline: 2px solid #b8895a; outline-offset: 3px; }

.icon-box { width: 72px; height: 72px; margin: 0 auto; position: relative; display: flex; align-items: center; justify-content: center; }

.card .label { font-size: .82rem; font-weight: 500; color: #4a3f35; margin-top: 10px; }
.card .desc { font-size: .7rem; color: #8a7a6a; line-height: 1.4; margin-top: 4px; padding: 0 4px; }

.state-tabs { display: flex; gap: 4px; justify-content: center; margin: 10px 0 2px; }
.state-tab {
  padding: 3px 12px; border-radius: 20px; font-size: .7rem; font-weight: 500;
  border: none; cursor: pointer; transition: all 0.2s ease;
  background: rgba(0,0,0,0.04); color: #8a7a6a;
}
.state-tab.active { background: #b8895a; color: #fff; }

/* ===== 通用动画 ===== */
@keyframes spin_cw  { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes scale_pulse { 0%, 100% { transform: scale(0.3); opacity: 0.6; } 50% { transform: scale(1.6); opacity: 0; } }
@keyframes scale_breath { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.5); opacity: 0.8; } }
@keyframes pulse_op { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.65; } }

.idle-group { opacity: 1; transition: opacity 0.4s ease; pointer-events: auto; }
.idle-group.hidden { opacity: 0; pointer-events: none; }
.scan-group { opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
.scan-group.visible { opacity: 1; pointer-events: auto; }

/* 方案1 */
.s1-ring { animation: spin_cw 3s linear infinite; transform-origin: 36px 36px; will-change: transform; }
.s1-wave { animation: scale_pulse 2.4s ease-out infinite; transform-origin: 36px 36px; }
.s1-w2 { animation: scale_pulse 2.4s ease-out 0.8s infinite; transform-origin: 36px 36px; }
.s1-w3 { animation: scale_pulse 2.4s ease-out 1.6s infinite; transform-origin: 36px 36px; }

/* 方案2 */
.s2-ring { animation: spin_cw 2.6s linear infinite; transform-origin: 36px 36px; will-change: transform; }
.s2-b { animation: scale_breath 2s ease-in-out infinite; transform-origin: 36px 36px; }

/* 方案3 */
.s3-ring { animation: spin_cw 3.2s linear infinite; transform-origin: 36px 36px; will-change: transform; }
.s3-r { animation: scale_pulse 2s ease-out infinite; transform-origin: 36px 36px; }
.s3-r2 { animation: scale_pulse 2s ease-out 1s infinite; transform-origin: 36px 36px; }

/* 方案4 */
.s4-ring { animation: spin_cw 2.2s linear infinite; transform-origin: 36px 36px; will-change: transform; }
.s4-d { animation: pulse_op 1.8s ease-in-out infinite; }
.s4-d2 { animation: pulse_op 1.8s ease-in-out 0.45s infinite; }
.s4-d3 { animation: pulse_op 1.8s ease-in-out 0.9s infinite; }
.s4-d4 { animation: pulse_op 1.8s ease-in-out 1.35s infinite; }

/* 方案5 */
.s5-ring { animation: spin_cw 2.8s linear infinite; transform-origin: 36px 36px; will-change: transform; }
.s5-g { animation: scale_breath 1.8s ease-in-out infinite; transform-origin: 36px 36px; }

/* 方案6 */
.s6-ring { animation: spin_cw 3s linear infinite; transform-origin: 36px 36px; will-change: transform; }

.footer { text-align: center; margin-top: 40px; color: #8a7a6a; font-size: .8rem; }
.footer button {
  margin-top: 10px; padding: 10px 28px; border: none; border-radius: 12px;
  background: #b8895a; color: #fff; font-size: .88rem; cursor: pointer;
}
.footer button:hover { opacity: 0.85; }
</style>
</head>
<body>

<h1>✦ 搜索图标 — 外环旋转 + 内波</h1>
<p class="sub">静止态一眼看出是搜索/雷达 · 扫描态外环旋转内波脉冲</p>

<div class="gallery">

<!-- ① 雷达扇形 + 3层波纹 -->
<div class="card" data-id="1" onclick="select(this)">
  <div class="icon-box">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="idle-group" data-idle="1">
      <!-- 外圈虚线环 -->
      <circle cx="36" cy="36" r="28" stroke="#b8895a" stroke-width="1.2" stroke-dasharray="4 7" opacity="0.25"/>
      <!-- 内圈稀疏环 -->
      <circle cx="36" cy="36" r="20" stroke="#b8895a" stroke-width="0.3" opacity="0.1"/>
      <circle cx="36" cy="36" r="12" stroke="#b8895a" stroke-width="0.2" opacity="0.08"/>
      <!-- 放射线朝右上45° — 一眼看出是雷达 -->
      <g transform="rotate(45,36,36)" opacity="0.55">
        <line x1="36" y1="36" x2="36" y2="10" stroke="#b8895a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="36" y1="36" x2="40" y2="10" stroke="#b8895a" stroke-width="0.7" opacity="0.2"/>
        <line x1="36" y1="36" x2="32" y2="10" stroke="#b8895a" stroke-width="0.7" opacity="0.2"/>
        <line x1="36" y1="36" x2="42" y2="12" stroke="#b8895a" stroke-width="0.5" opacity="0.15"/>
        <line x1="36" y1="36" x2="30" y2="12" stroke="#b8895a" stroke-width="0.5" opacity="0.15"/>
      </g>
      <circle cx="36" cy="36" r="3" fill="#b8895a" opacity="0.4"/>
    </svg>
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="scan-group" data-scan="1">
      <circle cx="36" cy="36" r="28" stroke="#b8895a" stroke-width="1.2" stroke-dasharray="4 7" class="s1-ring" opacity="0.4"/>
      <circle cx="36" cy="36" r="20" stroke="#b8895a" stroke-width="0.3" opacity="0.12"/>
      <circle cx="36" cy="36" r="12" stroke="#b8895a" stroke-width="0.2" opacity="0.08"/>
      <!-- 旋转的放射线组 -->
      <g class="s1-ring" opacity="0.6">
        <path d="M36 36 L36 8 A28 28 0 0 1 64 36 Z" fill="#b8895a" opacity="0.08"/>
        <line x1="36" y1="36" x2="36" y2="8" stroke="#b8895a" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
        <line x1="36" y1="36" x2="40" y2="8" stroke="#b8895a" stroke-width="0.7" opacity="0.2"/>
        <line x1="36" y1="36" x2="32" y2="8" stroke="#b8895a" stroke-width="0.7" opacity="0.2"/>
      </g>
      <!-- 3层波纹 -->
      <circle cx="36" cy="36" r="3" fill="none" stroke="#b8895a" stroke-width="1.5" class="s1-wave"/>
      <circle cx="36" cy="36" r="3" fill="none" stroke="#b8895a" stroke-width="1.5" class="s1-w2"/>
      <circle cx="36" cy="36" r="3" fill="none" stroke="#b8895a" stroke-width="1.5" class="s1-w3"/>
      <circle cx="36" cy="36" r="3" fill="#b8895a" opacity="0.5"/>
    </svg>
  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,1,'idle')">静止</button><button class="state-tab" onclick="switchState(event,1,'scan')">扫描</button></div>
  <div class="label">① 雷达扇形 + 3层波纹</div>
  <div class="desc">静止即见放射线朝右上45°，一眼雷达</div>
</div>

<!-- ② 实线环 + 中心呼吸 -->
<div class="card" data-id="2" onclick="select(this)">
  <div class="icon-box">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="idle-group" data-idle="2">
      <!-- 放大镜造型 — 一眼搜索 -->
      <circle cx="32" cy="32" r="18" stroke="#b8895a" stroke-width="2" opacity="0.35"/>
      <line x1="45" y1="45" x2="58" y2="58" stroke="#b8895a" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
      <!-- 放大镜内部小光点 -->
      <circle cx="32" cy="32" r="2" fill="#b8895a" opacity="0.3"/>
    </svg>
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="scan-group" data-scan="2">
      <!-- 放大镜外圈旋转（虚线化） -->
      <circle cx="32" cy="32" r="18" stroke="#b8895a" stroke-width="2" stroke-dasharray="3 6" class="s2-ring" opacity="0.4"/>
      <line x1="45" y1="45" x2="58" y2="58" stroke="#b8895a" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
      <!-- 内部扫描 -->
      <circle cx="32" cy="32" r="11" fill="none" stroke="#b8895a" stroke-width="0.4" opacity="0.15"/>
      <circle cx="32" cy="32" r="5" fill="none" stroke="#b8895a" stroke-width="0.6" class="s2-b"/>
      <circle cx="32" cy="32" r="2.5" fill="#b8895a" class="s2-b"/>
    </svg>
  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,2,'idle')">静止</button><button class="state-tab" onclick="switchState(event,2,'scan')">扫描</button></div>
  <div class="label">② 放大镜 + 中心呼吸</div>
  <div class="desc">静止为放大镜，扫描外圈旋转内圈呼吸</div>
</div>

<!-- ③ 雷达双环 + 涟漪 -->
<div class="card" data-id="3" onclick="select(this)">
  <div class="icon-box">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="idle-group" data-idle="3">
      <!-- 雷达同心环 — 典型雷达造型 -->
      <circle cx="36" cy="36" r="28" stroke="#b8895a" stroke-width="0.8" stroke-dasharray="3 6" opacity="0.22"/>
      <circle cx="36" cy="36" r="20" stroke="#b8895a" stroke-width="0.4" opacity="0.12"/>
      <circle cx="36" cy="36" r="12" stroke="#b8895a" stroke-width="0.3" opacity="0.08"/>
      <!-- 扫描锥固定朝右上45° -->
      <g transform="rotate(45,36,36)" opacity="0.5">
        <path d="M36 36 L36 8 A28 28 0 0 1 64 36 Z" fill="#b8895a" opacity="0.04"/>
        <line x1="36" y1="36" x2="36" y2="8" stroke="#b8895a" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
      </g>
      <circle cx="36" cy="36" r="3" fill="#b8895a" opacity="0.35"/>
    </svg>
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="scan-group" data-scan="3">
      <circle cx="36" cy="36" r="28" stroke="#b8895a" stroke-width="0.8" stroke-dasharray="3 6" class="s3-ring" opacity="0.35"/>
      <circle cx="36" cy="36" r="20" stroke="#b8895a" stroke-width="0.4" opacity="0.12"/>
      <circle cx="36" cy="36" r="12" stroke="#b8895a" stroke-width="0.3" opacity="0.08"/>
      <!-- 旋转扫描锥 -->
      <g class="s3-ring" opacity="0.55">
        <path d="M36 36 L36 8 A28 28 0 0 1 64 36 Z" fill="#b8895a" opacity="0.08"/>
        <line x1="36" y1="36" x2="36" y2="8" stroke="#b8895a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      </g>
      <!-- 2层涟漪 -->
      <circle cx="36" cy="36" r="3" fill="none" stroke="#b8895a" stroke-width="1.2" class="s3-r"/>
      <circle cx="36" cy="36" r="3" fill="none" stroke="#b8895a" stroke-width="1.2" class="s3-r2"/>
      <circle cx="36" cy="36" r="2.5" fill="#b8895a" opacity="0.45"/>
    </svg>
  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,3,'idle')">静止</button><button class="state-tab" onclick="switchState(event,3,'scan')">扫描</button></div>
  <div class="label">③ 雷达双环 + 涟漪</div>
  <div class="desc">典型雷达同心圆+扫描锥，一眼雷达</div>
</div>

<!-- ④ 搜索框 + 4点脉冲 -->
<div class="card" data-id="4" onclick="select(this)">
  <div class="icon-box">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="idle-group" data-idle="4">
      <!-- 搜索框+把手 — 一眼搜索 -->
      <circle cx="32" cy="32" r="16" stroke="#b8895a" stroke-width="1.5" opacity="0.3"/>
      <line x1="43" y1="43" x2="56" y2="56" stroke="#b8895a" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
      <!-- 内部十字线（准星） -->
      <line x1="24" y1="32" x2="40" y2="32" stroke="#b8895a" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="32" y1="24" x2="32" y2="40" stroke="#b8895a" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <circle cx="32" cy="32" r="2" fill="#b8895a" opacity="0.3"/>
    </svg>
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="scan-group" data-scan="4">
      <circle cx="32" cy="32" r="16" stroke="#b8895a" stroke-width="1.5" stroke-dasharray="3 5" class="s4-ring" opacity="0.4"/>
      <line x1="43" y1="43" x2="56" y2="56" stroke="#b8895a" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
      <!-- 4个点十字排列交替脉冲 -->
      <circle cx="32" cy="20" r="2.5" fill="#b8895a" class="s4-d"/>
      <circle cx="32" cy="44" r="2.5" fill="#b8895a" class="s4-d2"/>
      <circle cx="20" cy="32" r="2.5" fill="#b8895a" class="s4-d3"/>
      <circle cx="44" cy="32" r="2.5" fill="#b8895a" class="s4-d4"/>
      <circle cx="32" cy="32" r="2" fill="#b8895a" opacity="0.4"/>
    </svg>
  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,4,'idle')">静止</button><button class="state-tab" onclick="switchState(event,4,'scan')">扫描</button></div>
  <div class="label">④ 搜索框 + 4点脉冲</div>
  <div class="desc">放大镜+十字准星，内部4点交替闪烁</div>
</div>

<!-- ⑤ 雷达扇形 + 光晕呼吸 -->
<div class="card" data-id="5" onclick="select(this)">
  <div class="icon-box">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="idle-group" data-idle="5">
      <circle cx="36" cy="36" r="28" stroke="#b8895a" stroke-width="0.8" opacity="0.2"/>
      <circle cx="36" cy="36" r="20" stroke="#b8895a" stroke-width="0.3" opacity="0.1"/>
      <circle cx="36" cy="36" r="12" stroke="#b8895a" stroke-width="0.2" opacity="0.08"/>
      <!-- 放射线组固定45° -->
      <g transform="rotate(45,36,36)" opacity="0.5">
        <line x1="36" y1="36" x2="36" y2="8" stroke="#b8895a" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
        <line x1="36" y1="36" x2="39" y2="9" stroke="#b8895a" stroke-width="0.6" opacity="0.2"/>
        <line x1="36" y1="36" x2="33" y2="9" stroke="#b8895a" stroke-width="0.6" opacity="0.2"/>
      </g>
      <circle cx="36" cy="36" r="3" fill="#b8895a" opacity="0.3"/>
    </svg>
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="scan-group" data-scan="5">
      <circle cx="36" cy="36" r="28" stroke="#b8895a" stroke-width="0.8" class="s5-ring" opacity="0.35"/>
      <circle cx="36" cy="36" r="20" stroke="#b8895a" stroke-width="0.3" opacity="0.1"/>
      <circle cx="36" cy="36" r="12" stroke="#b8895a" stroke-width="0.2" opacity="0.08"/>
      <!-- 放射线旋转 -->
      <g class="s5-ring" opacity="0.55">
        <path d="M36 36 L36 8 A28 28 0 0 1 64 36 Z" fill="#b8895a" opacity="0.08"/>
        <line x1="36" y1="36" x2="36" y2="8" stroke="#b8895a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="36" y1="36" x2="39" y2="9" stroke="#b8895a" stroke-width="0.6" opacity="0.2"/>
        <line x1="36" y1="36" x2="33" y2="9" stroke="#b8895a" stroke-width="0.6" opacity="0.2"/>
      </g>
      <!-- 中心光晕呼吸 -->
      <circle cx="36" cy="36" r="5" fill="none" stroke="#b8895a" stroke-width="0.8" class="s5-g"/>
      <circle cx="36" cy="36" r="2.5" fill="#b8895a" class="s5-g"/>
    </svg>
  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,5,'idle')">静止</button><button class="state-tab" onclick="switchState(event,5,'scan')">扫描</button></div>
  <div class="label">⑤ 雷达扇形 + 光晕呼吸</div>
  <div class="desc">放射线+同心圆，中心光晕呼吸缩放</div>
</div>

<!-- ⑥ 放大镜 + 弧线旋转 -->
<div class="card" data-id="6" onclick="select(this)">
  <div class="icon-box">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="idle-group" data-idle="6">
      <!-- 搜索图标 — 一眼搜索 -->
      <circle cx="32" cy="32" r="17" stroke="#b8895a" stroke-width="1.8" opacity="0.32"/>
      <line x1="44" y1="44" x2="58" y2="58" stroke="#b8895a" stroke-width="2.2" stroke-linecap="round" opacity="0.3"/>
      <!-- 内部小圆点 -->
      <circle cx="32" cy="32" r="2" fill="#b8895a" opacity="0.3"/>
    </svg>
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" class="scan-group" data-scan="6">
      <!-- 放大镜外圈旋转，带拖尾 -->
      <circle cx="32" cy="32" r="17" stroke="#b8895a" stroke-width="1.8" class="s6-ring" opacity="0.4" stroke-dasharray="4 7"/>
      <line x1="44" y1="44" x2="58" y2="58" stroke="#b8895a" stroke-width="2.2" stroke-linecap="round" opacity="0.25"/>
      <!-- 旋转扫描扇形（限在镜框内） -->
      <g class="s6-ring" style="clip-path: circle(17px at 32px 32px)">
        <path d="M32 32 L32 15 A17 17 0 0 1 49 32 Z" fill="#b8895a" opacity="0.1"/>
        <line x1="32" y1="32" x2="32" y2="15" stroke="#b8895a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      </g>
      <circle cx="32" cy="32" r="2.5" fill="#b8895a" opacity="0.45"/>
    </svg>
  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,6,'idle')">静止</button><button class="state-tab" onclick="switchState(event,6,'scan')">扫描</button></div>
  <div class="label">⑥ 放大镜 + 内扫描</div>
  <div class="desc">放大镜内扇形扫描旋转，限在镜框内</div>
</div>

</div>

<div class="footer">
  <p>点击卡片选中 · 切换「静止」/「扫描」预览</p>
  <button onclick="showSelected()">显示选中编号</button>
</div>

<script>
let current = null;
function select(el) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  current = el.dataset.id;
}
function switchState(evt, id, state) {
  evt.stopPropagation();
  const card = document.querySelector(`.card[data-id="${id}"]`);
  card.querySelectorAll('.state-tab').forEach(t => t.classList.remove('active'));
  evt.target.classList.add('active');
  const idle = card.querySelector(`[data-idle="${id}"]`);
  const scan = card.querySelector(`[data-scan="${id}"]`);
  if (idle) idle.classList.toggle('hidden', state !== 'idle');
  if (scan) scan.classList.toggle('visible', state === 'scan');
  if (!current) { card.classList.add('selected'); current = String(id); }
}
function showSelected() {
  if (current) alert('你选中了：第 ' + current + ' 号');
  else alert('请先点击一个卡片');
}
</script>
</body>
</html>
