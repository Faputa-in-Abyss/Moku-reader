<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨读 · 小说阅读器</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{--bg:#161210;--text:#e8ddd0;--text-dim:#8a7e6b;--accent:#d4a96a;--accent-rgb:212,169,106;--shadow:0 4px 24px rgba(0,0,0,0.35);--glass-bg:rgba(30,26,22,0.55);--border-glass:rgba(212,169,106,0.06);--reader-bg:#161210;--morph-start:rgba(30,26,22,0.6);--morph-end:#161210}
[data-theme="light"]{--bg:#d9cec0;--text:#1f1812;--text-dim:#8f7d6a;--accent:#b88950;--accent-rgb:184,137,80;--shadow:0 4px 24px rgba(0,0,0,0.05);--glass-bg:rgba(255,255,255,0.35);--border-glass:rgba(255,255,255,0.45);--reader-bg:#e8e0d6;--morph-start:rgba(255,255,255,0.4);--morph-end:#e8e0d6}
[data-theme="auto"]{--bg:#d9cec0;--text:#1f1812;--text-dim:#8f7d6a;--accent:#b88950;--accent-rgb:184,137,80;--shadow:0 4px 24px rgba(0,0,0,0.05);--glass-bg:rgba(255,255,255,0.35);--border-glass:rgba(255,255,255,0.45);--reader-bg:#e8e0d6;--morph-start:rgba(255,255,255,0.4);--morph-end:#e8e0d6}
@media(prefers-color-scheme:dark){[data-theme="auto"]{--bg:#161210;--text:#e8ddd0;--text-dim:#8a7e6b;--accent:#d4a96a;--accent-rgb:212,169,106;--shadow:0 4px 24px rgba(0,0,0,0.35);--glass-bg:rgba(30,26,22,0.55);--border-glass:rgba(212,169,106,0.06);--reader-bg:#161210;--morph-start:rgba(30,26,22,0.6);--morph-end:#161210}}
html{font-size:16px}
[data-theme="light"]{color-scheme:light}[data-theme="dark"]{color-scheme:dark}[data-theme="auto"]{color-scheme:light dark}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.6s ease,color 0.6s ease}
#particleCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:1}
.morph-overlay{position:fixed;pointer-events:none;z-index:199;border-radius:50%;background:var(--morph-start);backdrop-filter:blur(40px) saturate(1.6);-webkit-backdrop-filter:blur(40px) saturate(1.6);border:1px solid var(--border-glass);box-shadow:0 0 80px rgba(var(--accent-rgb),0.12),0 0 200px rgba(var(--accent-rgb),0.04);transition:transform 0.7s cubic-bezier(0.22,0.9,0.35,1),opacity 0.4s ease;transform:translate(-50%,-50%) scale(0);opacity:0}
.morph-card-ghost{position:fixed;pointer-events:none;z-index:198;opacity:0;border-radius:16px;background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border-glass);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.6s cubic-bezier(0.22,0.9,0.35,1);overflow:hidden}
.morph-card-ghost .ghost-icon{font-size:2.8rem;margin-bottom:10px;transition:all 0.6s ease;position:relative;z-index:1}
.morph-card-ghost .ghost-title{font-family:'Georgia','Noto Serif SC',serif;font-size:.95rem;font-weight:600;transition:all 0.6s ease;position:relative;z-index:1}
.morph-card-ghost.flying .ghost-icon{font-size:3.6rem}
.morph-card-ghost.flying .ghost-title{font-size:1.6rem}
.glass-panel{background:var(--glass-bg);backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);border:1px solid var(--border-glass);box-shadow:var(--shadow);position:relative;overflow:hidden}
.light-follow{position:absolute;inset:0;pointer-events:none;z-index:0;will-change:opacity;overflow:hidden}
.light-follow::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;transform:translate(-50%,-50%) scale(var(--sx,1),var(--sy,1));left:var(--lx,-250px);top:var(--ly,-250px);will-change:left,top,transform}
[data-theme="light"] .light-follow::before,[data-theme="auto"] .light-follow::before{background:radial-gradient(circle at center,rgba(255,255,255,0.25) 0%,rgba(255,255,255,0.12) 15%,rgba(255,255,255,0.05) 30%,rgba(184,137,80,0.03) 45%,transparent 65%)}
[data-theme="dark"] .light-follow::before{background:radial-gradient(circle at center,rgba(255,255,255,0.06) 0%,rgba(255,255,255,0.03) 20%,rgba(212,169,106,0.02) 35%,transparent 55%)}
@media(prefers-color-scheme:dark){[data-theme="auto"] .light-follow::before{background:radial-gradient(circle at center,rgba(255,255,255,0.06) 0%,rgba(255,255,255,0.03) 20%,rgba(212,169,106,0.02) 35%,transparent 55%)}}
.theme-fade{position:fixed;inset:0;z-index:9999;pointer-events:none;background:radial-gradient(circle at var(--tx,50%) var(--ty,50%),rgba(var(--accent-rgb),0.08) 0%,transparent 60%);opacity:0;transition:opacity 0.5s ease}
.theme-fade.active{opacity:1}
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:linear-gradient(180deg,var(--glass-bg) 60%,transparent);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--border-glass);transition:background 0.6s ease,border-color 0.6s ease}
.logo{display:flex;align-items:center;gap:12px;font-family:'Georgia','Noto Serif SC',serif;font-size:1.5rem;font-weight:600;letter-spacing:.08em;color:var(--text);text-decoration:none;transition:color 0.6s ease;position:relative;z-index:1}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#b8895a);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;font-weight:700;box-shadow:0 2px 16px rgba(var(--accent-rgb),0.2);transition:box-shadow 0.5s ease,background 0.6s ease}
.header-actions{display:flex;gap:8px;position:relative;z-index:1}
.btn{padding:8px 20px;border:1px solid transparent;border-radius:10px;background:transparent;backdrop-filter:blur(12px);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;font-size:.9rem;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:6px;position:relative;overflow:hidden}
.btn:hover{border-color:var(--border-glass);background:var(--glass-bg);transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#b8895a);color:#fff;border:none;box-shadow:0 2px 16px rgba(var(--accent-rgb),0.15)}
.btn-primary:hover{box-shadow:0 6px 32px rgba(var(--accent-rgb),0.25);transform:translateY(-2px)}
.library{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:40px 32px 80px}
.library-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px}
.library-title{font-family:'Georgia','Noto Serif SC',serif;font-size:1.8rem;font-weight:500;letter-spacing:.04em;color:var(--text);transition:color 0.6s ease}
.library-count{color:var(--text-dim);font-size:.9rem;transition:color 0.6s ease}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:28px}
.book-card{position:relative;cursor:pointer;transition:transform 0.5s ease;border-radius:16px}
.book-card:hover{transform:translateY(-6px)}
.book-cover{aspect-ratio:3/4;border-radius:16px;background:var(--glass-bg);backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;text-align:center;border:1px solid var(--border-glass);box-shadow:0 2px 16px var(--shadow);transition:box-shadow 0.5s ease,border-color 0.5s ease,background 0.6s ease;position:relative;overflow:hidden}
.book-cover::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(var(--accent-rgb),0.08) 0%,transparent 60%);opacity:0;transition:opacity 0.5s ease;pointer-events:none;z-index:1}
.book-card:hover .book-cover::before{opacity:1}
.book-card:hover .book-cover{box-shadow:0 12px 48px var(--shadow);border-color:rgba(var(--accent-rgb),0.10)}
.book-cover-icon{font-size:2.8rem;margin-bottom:10px;filter:drop-shadow(0 2px 12px rgba(var(--accent-rgb),0.10));transition:transform 0.5s ease,filter 0.5s ease;position:relative;z-index:2}
.book-card:hover .book-cover-icon{transform:scale(1.05);filter:drop-shadow(0 4px 20px rgba(var(--accent-rgb),0.18))}
.book-title{font-family:'Georgia','Noto Serif SC',serif;font-size:.95rem;font-weight:600;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:color 0.6s ease;position:relative;z-index:2}
.book-author{font-size:.8rem;color:var(--text-dim);margin-top:4px;transition:color 0.6s ease;position:relative;z-index:2}
.book-progress{position:absolute;bottom:10px;left:16px;right:16px;height:3px;background:rgba(var(--accent-rgb),0.06);border-radius:4px;overflow:hidden}
.book-progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#d4a96a);border-radius:4px;width:0%;transition:width 0.8s ease;box-shadow:0 0 8px rgba(var(--accent-rgb),0.12)}
.book-info{padding:10px 4px 0}
.book-chapter{font-size:.78rem;color:var(--text-dim);margin-top:2px;transition:color 0.6s ease}
.reader-view{display:flex;visibility:hidden;position:fixed;inset:0;z-index:200;background:var(--reader-bg);flex-direction:column;opacity:0;transition:opacity 0.3s ease,background 0.6s ease}
.reader-topbar{position:absolute;top:0;left:0;right:0;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,var(--glass-bg) 60%,transparent);backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--border-glass);opacity:0;transform:translateY(-100%);transition:all 0.45s ease,background 0.6s ease;z-index:10}
.reader-topbar.visible{opacity:1;transform:translateY(0)}
.reader-topbar-left{display:flex;align-items:center;gap:16px;position:relative;z-index:1}
.reader-topbar .btn-back{background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;padding:6px;border-radius:8px;transition:background 0.2s,color 0.6s ease;display:flex;align-items:center;gap:4px}
.reader-topbar .btn-back:hover{background:rgba(var(--accent-rgb),0.06)}
.reader-topbar .book-name{font-family:'Georgia','Noto Serif SC',serif;font-weight:500;transition:color 0.6s ease}
.reader-topbar-actions{display:flex;gap:8px;position:relative;z-index:1}
.reader-content{flex:1;overflow-y:auto;padding:60px 15% 80px;position:relative;scroll-behavior:smooth}
.reader-content::-webkit-scrollbar{width:0}
.reader-text{font-family:'Georgia','Noto Serif SC','Source Han Serif SC',serif;font-size:1.2rem;line-height:2;color:var(--text);max-width:680px;margin:0 auto;letter-spacing:.02em;text-align:justify;transition:color 0.6s ease}
.reader-text .chapter-title{text-align:center;font-size:1.6rem;font-weight:600;margin-bottom:40px;letter-spacing:.1em;color:var(--accent);text-shadow:0 0 40px rgba(var(--accent-rgb),0.10);padding-bottom:28px;position:relative;transition:color 0.6s ease}
.reader-text .chapter-title::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.35}
.reader-text p{text-indent:2em;margin-bottom:.5em}
.page-hotspot{position:absolute;top:0;width:15%;height:100%;z-index:5;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.5s ease}
.page-hotspot:hover{opacity:1}
.page-hotspot.left{left:0}
.page-hotspot.right{right:0}
.page-hotspot .arrow{width:44px;height:44px;border-radius:50%;background:var(--glass-bg);backdrop-filter:blur(16px);border:1px solid var(--border-glass);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--text-dim);box-shadow:0 4px 20px var(--shadow);transition:all 0.35s ease;position:relative;overflow:hidden}
.page-hotspot:hover .arrow{background:var(--accent);color:#fff;box-shadow:0 0 40px rgba(var(--accent-rgb),0.15);transform:scale(1.08)}
.chapter-sidebar{position:absolute;top:0;left:0;width:300px;height:100%;z-index:20;background:var(--glass-bg);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);transform:translateX(-100%);transition:transform 0.5s ease,background 0.6s ease;box-shadow:4px 0 40px rgba(0,0,0,0.05);overflow:hidden;border-right:1px solid var(--border-glass)}
.chapter-sidebar.open{transform:translateX(0)}
.chapter-sidebar-header{padding:20px 20px 12px;font-family:'Georgia','Noto Serif SC',serif;font-size:1.1rem;font-weight:600;color:var(--text);border-bottom:1px solid var(--border-glass);display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;transition:color 0.6s ease}
.chapter-list{padding:8px 0;overflow-y:auto;position:relative;z-index:2;height:calc(100% - 60px)}
.chapter-item{padding:12px 20px;cursor:pointer;transition:all 0.25s ease,color 0.6s ease;border-left:3px solid transparent;font-size:.9rem;color:var(--text-dim);position:relative;z-index:2}
.chapter-item:hover{background:rgba(var(--accent-rgb),0.03);color:var(--text);border-left-color:var(--accent)}
.chapter-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(var(--accent-rgb),0.04)}
.settings-panel{position:absolute;bottom:-100%;left:0;right:0;z-index:20;background:var(--glass-bg);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);padding:24px 32px 32px;border-top:1px solid var(--border-glass);transition:bottom 0.5s ease,background 0.6s ease;box-shadow:0 -8px 40px var(--shadow)}
.settings-panel.open{bottom:0}
.settings-group{display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:relative;z-index:1}
.settings-label{font-size:.85rem;color:var(--text-dim);min-width:60px;transition:color 0.6s ease}
.settings-group+.settings-group{margin-top:16px}
.font-size-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border-glass);background:transparent;backdrop-filter:blur(8px);color:var(--text);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.font-size-btn:hover{background:rgba(var(--accent-rgb),0.04);border-color:var(--accent)}
.font-size-display{font-size:.9rem;color:var(--text-dim);min-width:48px;text-align:center;transition:color 0.6s ease}
.theme-selector{display:flex;gap:8px;align-items:center}
.theme-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border-glass);background:transparent;backdrop-filter:blur(8px);color:var(--text-dim);cursor:pointer;font-size:.85rem;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;transition:all 0.3s ease,color 0.6s ease}
.theme-btn:hover{border-color:var(--accent);color:var(--text)}
.theme-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb),0.06)}
.theme-btn .hint{font-size:.7rem;opacity:.5;display:block;margin-top:2px}
@media(max-width:768px){header{padding:12px 16px}.library{padding:24px 16px 60px}.book-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:20px}.reader-content{padding:60px 32px 80px}.reader-text{font-size:1rem}.chapter-sidebar{width:260px}.settings-panel{padding:20px 16px 28px}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px;opacity:.3}
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="theme-fade" id="themeFade"></div>
<div class="morph-overlay" id="morphOverlay"></div>
<div class="morph-card-ghost" id="morphGhost"><div class="ghost-icon" id="ghostIcon">☯</div><div class="ghost-title" id="ghostTitle">仙逆</div></div>

<header class="glass-panel">
  <div class="light-follow"></div>
  <a class="logo" href="#"><span class="logo-icon">墨</span>墨读</a>
  <div class="header-actions">
    <button class="btn" onclick="cycleTheme(event)" title="切换主题"><span id="themeIcon">🌙</span></button>
    <button class="btn btn-primary" onclick="simulateImport()"><span>+</span> 导入小说</button>
  </div>
</header>

<section class="library" id="library">
  <div class="library-header"><h1 class="library-title">我的书库</h1><span class="library-count" id="bookCount">4 本书</span></div>
  <div class="book-grid" id="bookGrid"></div>
</section>

<div class="reader-view" id="readerView">
  <div class="reader-topbar">
    <div class="light-follow"></div>
    <div class="reader-topbar-left">
      <button class="btn-back" onclick="closeReader()">← 返回书库</button>
      <span class="book-name" id="readerBookName">仙逆</span>
    </div>
    <div class="reader-topbar-actions">
      <button class="btn" onclick="toggleChapterSidebar()">📖 目录</button>
      <button class="btn" onclick="toggleSettings()">⚙️</button>
    </div>
  </div>
  <div class="reader-content" id="readerContent">
    <div class="reader-text" id="readerText">
      <div class="chapter-title" id="readerChapterTitle">第一章 修仙之始</div>
      <div id="readerBody"></div>
    </div>
  </div>
  <div class="page-hotspot left" onclick="prevChapter()"><div class="arrow"><div class="light-follow" style="border-radius:50%"></div><span style="position:relative;z-index:1">‹</span></div></div>
  <div class="page-hotspot right" onclick="nextChapter()"><div class="arrow"><div class="light-follow" style="border-radius:50%"></div><span style="position:relative;z-index:1">›</span></div></div>
  <div class="chapter-sidebar" id="chapterSidebar">
    <canvas id="sidebarCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;"></canvas>
    <div class="light-follow"></div>
    <div class="chapter-sidebar-header"><span>章节目录</span><button class="btn" style="padding:4px 12px;font-size:.85rem" onclick="toggleChapterSidebar()">✕</button></div>
    <div class="chapter-list" id="chapterList"></div>
  </div>
  <div class="settings-panel" id="settingsPanel">
    <div class="light-follow"></div>
    <div style="position:relative;z-index:1">
      <div class="settings-group"><span class="settings-label">字号</span><button class="font-size-btn" onclick="changeFontSize(-1)">A−</button><span class="font-size-display" id="fontSizeDisplay">1.2rem</span><button class="font-size-btn" onclick="changeFontSize(1)">A+</button></div>
      <div class="settings-group"><span class="settings-label">主题</span><div class="theme-selector"><button class="theme-btn" data-theme="light" onclick="setTheme('light',event)">☀️ 浅色</button><button class="theme-btn" data-theme="dark" onclick="setTheme('dark',event)">🌙 深色</button><button class="theme-btn active" data-theme="auto" onclick="setTheme('auto',event)">🔄 自动 <span class="hint" id="autoHint">跟随系统</span></button></div></div>
    </div>
  </div>
</div>

<script>
// ===== 点光源 =====
(function(){const items=[];let mx=-9999,my=-9999,smoothOps=[];function refresh(){items.length=0;document.querySelectorAll('.light-follow').forEach(el=>{const p=el.parentElement;if(!p)return;const r=p.getBoundingClientRect(),e=80;items.push({el,p,l:r.left,t:r.top,r:r.right,b:r.bottom,w:r.width,h:r.height,dl:r.left-e,dt:r.top-e,dr:r.right+e,db:r.bottom+e,sx:1,sy:1})})}let tick=!1;function upd(){tick=!1;for(let i=0;i<items.length;i++){const it=items[i];const lx=mx-it.l,ly=my-it.t;it.el.style.setProperty('--lx',lx+'px');it.el.style.setProperty('--ly',ly+'px');let sx=1,sy=1;if(mx>=it.l&&mx<=it.r&&my>=it.t&&my<=it.b){const d=70,a=Math.min(lx,it.w-lx),b=Math.min(ly,it.h-ly);if(a<d){const f=1-a/d,e=f*f;sx=1-e*0.40,sy=1+e*0.15}if(b<d){const f=1-b/d,e=f*f;if(a<d*0.6){const fx=1-a/d,fy=1-b/d;sx=1-Math.max(fx,fy)*0.30,sy=1-Math.max(fx,fy)*0.30}else sy=1-e*0.40,sx=1+e*0.15}}else if(mx>=it.dl&&mx<=it.dr&&my>=it.dt&&my<=it.db){const dx=mx<it.l?it.l-mx:(mx>it.r?mx-it.r:0),dy=my<it.t?it.t-my:(my>it.b?my-it.b:0),d=Math.sqrt(dx*dx+dy*dy);if(d<60){const f=1-d/60,e=f*f;if(dx>dy)sx=1+e*0.25,sy=1-e*0.08;else sy=1+e*0.25,sx=1-e*0.08}}if(!it.sx)it.sx=1;if(!it.sy)it.sy=1;it.sx+=(sx-it.sx)*0.15;it.sy+=(sy-it.sy)*0.15;it.el.style.setProperty('--sx',it.sx);it.el.style.setProperty('--sy',it.sy);let t=0;if(mx>=it.dl&&mx<=it.dr&&my>=it.dt&&my<=it.db){if(mx>=it.l&&mx<=it.r&&my>=it.t&&my<=it.b)t=1;else{const dx=mx<it.l?it.l-mx:(mx>it.r?mx-it.r:0),dy=my<it.t?it.t-my:(my>it.b?my-it.b:0),d=Math.sqrt(dx*dx+dy*dy);t=Math.max(0,1-d/80);t=t*t*(3-2*t)}}if(smoothOps[i]===void 0)smoothOps[i]=t;const s=t>smoothOps[i]?0.18:0.1;smoothOps[i]+=(t-smoothOps[i])*s;it.el.style.opacity=smoothOps[i]<0.01?0:smoothOps[i]}}addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;if(!tick){tick=!0;requestAnimationFrame(upd)}});addEventListener('mouseleave',()=>{mx=-9999;my=-9999;items.forEach(i=>{i.el.style.opacity='0';i.sx=1;i.sy=1;i.el.style.setProperty('--sx','1');i.el.style.setProperty('--sy','1')})});let rt;function let mt;function morphOpen(c,e){const r=e.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,d=Math.sqrt(innerWidth*innerWidth+innerHeight*innerHeight)*2.5;const o=document.getElementById('morphOverlay'),g=document.getElementById('morphGhost'),gi=document.getElementById('ghostIcon'),gt=document.getElementById('ghostTitle'),b=books[e.getAttribute('data-index')];gi.textContent=b.icon;gt.textContent=b.title;o.style.transition='none';o.style.display='block';o.style.left=cx+'px';o.style.top=cy+'px';o.style.width=d+'px';o.style.height=d+'px';o.style.transform='translate(-50%,-50%) scale(0)';o.style.opacity='1';o.offsetHeight;g.style.transition='none';g.style.left=r.left+'px';g.style.top=r.top+'px';g.style.width=r.width+'px';g.style.height=r.height+'px';g.style.transform='none';g.style.borderRadius='16px';g.style.opacity='1';g.classList.remove('flying');g.offsetHeight;requestAnimationFrame(()=>{o.style.transition='transform 0.7s cubic-bezier(0.22,0.9,0.35,1),opacity 0.4s ease';o.style.transform='translate(-50%,-50%) scale(1)';g.style.transition='all 0.6s cubic-bezier(0.22,0.9,0.35,1)';g.classList.add('flying');g.style.left='50%';g.style.top='50%';g.style.width='240px';g.style.height='320px';g.style.transform='translate(-50%,-50%) scale(1.2)';g.style.borderRadius='24px';g.style.opacity='0'});clearTimeout(mt);mt=setTimeout(()=>{const r=document.getElementById('readerView');r.style.transition='opacity 0.4s ease';r.style.visibility='visible';r.style.opacity='1';o.style.transition='opacity 0.3s ease';o.style.opacity='0';setTimeout(()=>{o.style.display='none'},300);setTimeout(()=>{document.querySelector('.reader-topbar').classList.add('visible')},500)},750)}
function morphClose(cb){const r=document.getElementById('readerView'),g=document.getElementById('morphGhost');r.style.transition='opacity 0.25s ease';r.style.opacity='0';document.querySelector('.reader-topbar').classList.remove('visible');const cards=document.querySelectorAll('.book-card');let tr=null;if(currentBook)for(let i=0;i<books.length;i++)if(books[i]===currentBook&&cards[i]){tr=cards[i].getBoundingClientRect();break}if(!tr&&cards[0])tr=cards[0].getBoundingClientRect();if(!tr){if(cb)cb();return}g.style.transition='none';g.style.left='50%';g.style.top='50%';g.style.width='240px';g.style.height='320px';g.style.transform='translate(-50%,-50%) scale(1.2)';g.style.borderRadius='24px';g.style.opacity='0';g.offsetHeight;requestAnimationFrame(()=>{g.style.transition='all 0.35s cubic-bezier(0.22,0.9,0.35,1)';g.style.left=tr.left+'px';g.style.top=tr.top+'px';g.style.width=tr.width+'px';g.style.height=tr.height+'px';g.style.transform='none';g.style.borderRadius='16px';g.style.opacity='1'});setTimeout(()=>{r.style.visibility='hidden';g.style.opacity='0';if(cb)cb()},450)}
function openReader(i){const card=document.querySelectorAll('.book-card')[i];if(!card)return;currentBook=books[i];currentChapter=0;document.getElementById('readerBookName').textContent=currentBook.title;renderChapter(0);renderChapterList();morphOpen(card,card)}function closeReader(){morphClose(()=>{document.getElementById('chapterSidebar').classList.remove('open');document.getElementById('settingsPanel').classList.remove('open')})}

(function(){let s=localStorage.getItem('nr-theme')||'auto';const h=document.documentElement;h.setAttribute('data-theme',s);const dq=window.matchMedia('(prefers-color-scheme:dark)');window.setTheme=function(t,e){s=t;h.setAttribute('data-theme',t);localStorage.setItem('nr-theme',t);document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===t));document.getElementById('themeIcon').textContent=t==='light'?'☀️':t==='dark'?'🌙':'🔄';const hi=document.getElementById('autoHint');if(hi)hi.textContent=t==='auto'?(dq.matches?'当前:深色':'当前:浅色'):'跟随系统';const f=document.getElementById('themeFade');if(e){f.style.setProperty('--tx',e.clientX+'px');f.style.setProperty('--ty',e.clientY+'px')}f.classList.remove('active');f.offsetHeight;f.classList.add('active');clearTimeout(f._t);f._t=setTimeout(()=>f.classList.remove('active'),500);if(window.__onThemeChange)window.__onThemeChange(t)};window.cycleTheme=function(e){const o=['light','dark','auto'];let i=o.indexOf(s);setTheme(o[(i+1)%3],e)};const ic=document.getElementById('themeIcon');ic.textContent=s==='light'?'☀️':s==='dark'?'🌙':'🔄';document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===s));const hi=document.getElementById('autoHint');if(hi&&s==='auto')hi.textContent=dq.matches?'当前:深色':'当前:浅色';dq.addEventListener('change',()=>{if(s==='auto'){h.setAttribute('data-theme','auto');if(window.__onThemeChange)window.__onThemeChange('auto')}})})();

const books=[{id:1,title:'仙逆',author:'耳根',icon:'☯',progress:0.35,chapter:'第352章',chapters:['第一章 修仙之始','第二章 灵根觉醒','第三章 初入仙门','第四章 筑基之路','第五章 妖兽森林','第六章 秘境探险','第七章 金丹大成','第八章 天劫降临','第九章 仙府之谜','第十章 飞升之路']},{id:2,title:'诡秘之主',author:'爱潜水的乌贼',icon:'🕯',progress:0.62,chapter:'第621章',chapters:['第一章 克莱恩','第二章 值夜者','第三章 占卜家','第四章 非凡特性','第五章 廷根市','第六章 序列魔药']},{id:3,title:'三体',author:'刘慈欣',icon:'🌌',progress:0.88,chapter:'第28章',chapters:['第一章 科学边界','第二章 三体游戏','第三章 红岸基地','第四章 黑暗森林','第五章 面壁者','第六章 威慑纪元']},{id:4,title:'全职高手',author:'蝴蝶蓝',icon:'🎮',progress:0.12,chapter:'第18章',chapters:['第一章 退役','第二章 重返','第三章 新手村','第四章 组队','第五章 挑战赛']}];let currentBook=null,currentChapter=0,fontSize=1.2;

// ===== 主页粒子引擎 =====
(function(){const c=document.getElementById('particleCanvas'),ctx=c.getContext('2d');let W,H,pts=[],mouse={x:-9999,y:-9999,vx:0,vy:0,px:-9999,py:-9999},t=0;let clr=[184,137,80],clr2=[200,180,230];function rs(){W=c.width=innerWidth;H=c.height=innerHeight}addEventListener('resize',rs);rs();function r1(){const s=getComputedStyle(document.documentElement),p=s.getPropertyValue('--accent-rgb').trim().split(',').map(v=>parseInt(v.trim()));return p.length===3?p:clr}function r2(){const s=getComputedStyle(document.documentElement),p=s.getPropertyValue('--particle-color2').trim().split(',').map(v=>parseInt(v.trim()));return p.length===3?p:clr2}class Pt{constructor(){this.reset()}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.s=1.2+Math.random()*2.2;this.sx=(Math.random()-.5)*.2;this.sy=(Math.random()-.5)*.2;this.bo=.12+Math.random()*.35;this.to=this.bo;this.co=this.bo;this.wf=.005+Math.random()*.015;this.wa=.3+Math.random()*.8;this.wo=Math.random()*6.28;this.cm=Math.random();this.z=.5+Math.random()*.5}upd(){const wb=Math.sin(t*this.wf+this.wo)*this.wa;this.sx+=(Math.random()-.5)*.02;this.sy+=(Math.random()-.5)*.02;this.sx*=.98;this.sy*=.98;const dx=this.x-mouse.x,dy=this.y-mouse.y,d=Math.sqrt(dx*dx+dy*dy),md=180*this.z;if(d<md&&d>0){const f=(1-d/md)*.6*this.z,a=Math.atan2(dy,dx),fa=Math.atan2(mouse.vy,mouse.vx),fi=Math.min(1,Math.sqrt(mouse.vx*mouse.vx+mouse.vy*mouse.vy)*.05);this.sx+=Math.cos(a)*f+Math.cos(fa)*fi*.3;this.sy+=Math.sin(a)*f+Math.sin(fa)*fi*.3;this.to=.05+(d/md)*this.bo}else this.to=this.bo;this.co+=(this.to-this.co)*.05;this.x+=this.sx+wb*.02;this.y+=this.sy+Math.cos(t*this.wf+this.wo)*.1;if(this.x<-20)this.x=W+20;if(this.x>W+20)this.x=-20;if(this.y<-20)this.y=H+20;if(this.y>H+20)this.y=-20}draw(){const r=clr[0]+(clr2[0]-clr[0])*this.cm,g=clr[1]+(clr2[1]-clr[1])*this.cm,b=clr[2]+(clr2[2]-clr[2])*this.cm,a=this.co*this.z;const grad=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.s*this.z*3);grad.addColorStop(0,`rgba(${r|0},${g|0},${b|0},${a*.5})`);grad.addColorStop(.3,`rgba(${r|0},${g|0},${b|0},${a*.15})`);grad.addColorStop(1,`rgba(${r|0},${g|0},${b|0},0)`);ctx.beginPath();ctx.arc(this.x,this.y,this.s*this.z,0,6.28);ctx.fillStyle=grad;ctx.fill();ctx.beginPath();ctx.arc(this.x,this.y,this.s*this.z*.35,0,6.28);ctx.fillStyle=`rgba(255,255,255,${a*.2})`;ctx.fill()}}for(let i=0;i<150;i++)pts.push(new Pt());let attrs=[];function updAttrs(){attrs=[];document.querySelectorAll('.book-card').forEach(el=>{const r=el.getBoundingClientRect();attrs.push({x:r.left+r.width/2,y:r.top+r.height/2,rad:Math.max(r.width,r.height)*.7,str:.03})});document.querySelectorAll('.btn').forEach(el=>{const r=el.getBoundingClientRect();if(r.width>0)attrs.push({x:r.left+r.width/2,y:r.top+r.height/2,rad:80,str:.02})})}function apply(p){for(const pt of attrs){const dx=pt.x-p.x,dy=pt.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<pt.rad&&d>5){const f=(1-d/pt.rad)*pt.str*p.z,a=Math.atan2(dy,dx);p.sx+=Math.cos(a)*f*.3+Math.cos(a+1.57)*f*.5;p.sy+=Math.sin(a)*f*.3+Math.sin(a+1.57)*f*.5}}}addEventListener('mousemove',e=>{mouse.px=mouse.x;mouse.py=mouse.y;mouse.x=e.clientX;mouse.y=e.clientY;mouse.vx=mouse.x-mouse.px;mouse.vy=mouse.y-mouse.py});addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999;mouse.vx=0;mouse.vy=0});let fc=0;function anim(){ctx.clearRect(0,0,W,H);t+=.015;fc++;if(fc%30===0){clr=r1();clr2=r2();updAttrs()}for(const p of pts){apply(p);p.upd();p.draw()}if(fc%2===0)for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<100){const a=(1-d/100)*.04;ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(${clr[0]},${clr[1]},${clr[2]},${a})`;ctx.lineWidth=.4;ctx.stroke()}}requestAnimationFrame(anim)}let rt;addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{rs();updAttrs()},200)});window.__onThemeChange=function(){clr=r1();clr2=r2()};setTimeout(updAttrs,100);anim()})();

// ===== 侧边栏粒子引擎 =====
(function(){const sb=document.getElementById('chapterSidebar');if(!sb||!sb.querySelector('#sidebarCanvas'))return;const canvas=sb.querySelector('#sidebarCanvas'),ctx=canvas.getContext('2d');let W,H,pts=[],animId=null,running=!1,t=0,clr=[184,137,80],clr2=[200,180,230];function resize(){const r=sb.getBoundingClientRect();W=canvas.width=r.width;H=canvas.height=r.height}function rc1(){const s=getComputedStyle(document.documentElement),p=s.getPropertyValue('--accent-rgb').trim().split(',').map(v=>parseInt(v.trim()));return p.length===3?p:clr}function rc2(){const s=getComputedStyle(document.documentElement),p=s.getPropertyValue('--particle-color2').trim().split(',').map(v=>parseInt(v.trim()));return p.length===3?p:clr2}class Pt{constructor(){this.reset()}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.s=.8+Math.random()*1.6;this.sx=(Math.random()-.5)*.15;this.sy=(Math.random()-.5)*.15;this.op=.1+Math.random()*.25;this.wf=.005+Math.random()*.015;this.wa=.2+Math.random()*.5;this.wo=Math.random()*6.28;this.cm=Math.random();this.z=.5+Math.random()*.5}upd(){this.sx+=(Math.random()-.5)*.015;this.sy+=(Math.random()-.5)*.015;this.sx*=.97;this.sy*=.97;this.x+=this.sx+Math.sin(t*this.wf+this.wo)*this.wa*.015;this.y+=this.sy+Math.cos(t*this.wf+this.wo)*this.wa*.01;if(this.x<-10)this.x=W+10;if(this.x>W+10)this.x=-10;if(this.y<-10)this.y=H+10;if(this.y>H+10)this.y=-10}draw(){const r=clr[0]+(clr2[0]-clr[0])*this.cm,g=clr[1]+(clr2[1]-clr[1])*this.cm,b=clr[2]+(clr2[2]-clr[2])*this.cm,a=this.op*this.z*.6;const grad=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.s*this.z*3);grad.addColorStop(0,`rgba(${r|0},${g|0},${b|0},${a*.5})`);grad.addColorStop(.5,`rgba(${r|0},${g|0},${b|0},${a*.15})`);grad.addColorStop(1,`rgba(0,0,0,0)`);ctx.beginPath();ctx.arc(this.x,this.y,this.s*this.z,0,6.28);ctx.fillStyle=grad;ctx.fill();ctx.beginPath();ctx.arc(this.x,this.y,this.s*this.z*.3,0,6.28);ctx.fillStyle=`rgba(255,255,255,${a*.2})`;ctx.fill()}}function init(cnt){pts=[];for(let i=0;i<cnt;i++){const p=new Pt();if(W>0&&H>0)p.reset();pts.push(p)}}let fc=0;function anim(){if(!running)return;ctx.clearRect(0,0,W,H);t+=.012;fc++;if(fc%30===0){clr=rc1();clr2=rc2()}for(const p of pts){p.upd();p.draw()}if(fc%2===0)for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<60){const a=(1-d/60)*.03;ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(${clr[0]},${clr[1]},${clr[2]},${a})`;ctx.lineWidth=.3;ctx.stroke()}}animId=requestAnimationFrame(anim)}const start=()=>{if(running)return;running=!0;resize();init(50);anim()};const stop=()=>{running=!1;if(animId){cancelAnimationFrame(animId);animId=null}ctx.clearRect(0,0,W,H)};window.__sidebarParticles={start,stop};const ro=new ResizeObserver(()=>{resize();if(running)init(50)});ro.observe(sb);const orig=window.__onThemeChange;window.__onThemeChange=function(t){if(orig)orig(t);clr=rc1();clr2=rc2()}})();

// ===== UI =====
function renderLibrary(){document.getElementById('bookGrid').innerHTML=books.map((b,i)=>`<div class="book-card" data-index="${i}" onclick="openReader(${i})" onmousemove="handleGlow(event,this)"><div class="book-cover"><div class="book-cover-icon">${b.icon}</div><div class="book-title">${b.title}</div><div class="book-author">${b.author}</div><div class="book-progress"><div class="book-progress-bar" style="width:${b.progress*100}%"></div></div></div><div class="book-info"><div class="book-chapter">${b.chapter}</div></div></div>`).join('');document.getElementById('bookCount').textContent=`${books.length} 本书`}
function handleGlow(e,el){const r=el.getBoundingClientRect();el.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');el.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%')}
function toggleChapterSidebar(){const sb=document.getElementById('chapterSidebar');const opening=!sb.classList.contains('open');sb.classList.toggle('open');if(window.__sidebarParticles){if(opening)setTimeout(()=>window.__sidebarParticles.start(),100);else window.__sidebarParticles.stop()}if(window.__refreshLightRects){setTimeout(window.__refreshLightRects,50);setTimeout(window.__refreshLightRects,300)}}
function toggleSettings(){document.getElementById('settingsPanel').classList.toggle('open');if(window.__refreshLightRects){setTimeout(window.__refreshLightRects,50);setTimeout(window.__refreshLightRects,300)}}
function changeFontSize(d){fontSize=Math.min(2,Math.max(.8,fontSize+d*.1));document.getElementById('readerText').style.fontSize=fontSize+'rem';document.getElementById('fontSizeDisplay').textContent=fontSize+'rem'}
function renderChapter(idx){if(!currentBook)return;currentChapter=idx;const ch=currentBook.chapters[idx];document.getElementById('readerChapterTitle').textContent=ch;const paras=['夜色如水，繁星点点。这是'+ch+'的开篇。','林寒盘膝坐在山巅的青石上，感受着体内那股微弱的气流缓缓运转。','风从山谷中吹来，带着草木的清香。他深吸一口气，感觉丹田中的那股气息又壮大了几分。','天地之间的灵气缓缓流淌，像是一条无形的河流，在他的经脉中穿梭。','忽然，远处的天际划过一道流光，那光芒璀璨夺目，将半边夜空都照亮了。','林寒猛地站起身，眼中闪过一丝精光——那是修士御剑飞行的光芒。','从他踏入修真界的那一天起，他就知道，这个世界远比他想象的要广阔。','山下的村庄已经沉睡，只有几声犬吠偶尔传来。林寒握紧了拳头，目光坚定。','他不能永远待在这个小地方，他要去寻找传说中的仙门，去寻找真正的修仙之道。','晨曦微露，第一缕阳光穿透云层，洒在他的脸上。','前方的道路充满未知，但他的心中却没有丝毫畏惧。','若有光，他便追光而去。若无光，他便以身为光，照亮前路。'];document.getElementById('readerBody').innerHTML=paras.map(p=>`<p>${p}</p>`).join('');document.getElementById('readerContent').scrollTo({top:0,behavior:'smooth'});document.querySelectorAll('.chapter-item').forEach((el,i)=>el.classList.toggle('active',i===idx))}
function nextChapter(){if(currentBook&&currentChapter<currentBook.chapters.length-1)renderChapter(currentChapter+1)}
function prevChapter(){if(currentBook&&currentChapter>0)renderChapter(currentChapter-1)}
function renderChapterList(){document.getElementById('chapterList').innerHTML=currentBook.chapters.map((ch,i)=>`<div class="chapter-item${i===currentChapter?' active':''}" onclick="renderChapter(${i});document.getElementById('chapterSidebar').classList.remove('open')"><span style="font-size:.78rem;font-weight:600;opacity:.6;margin-right:8px">第${i+1}章</span>${ch}</div>`).join('')}
let topTimer;addEventListener('mousemove',e=>{const tb=document.querySelector('.reader-topbar');const rv=document.getElementById('readerView');if(rv.style.visibility!=='visible')return;clearTimeout(topTimer);if(e.clientY<80)tb.classList.add('visible');else topTimer=setTimeout(()=>{if(!document.querySelector('.chapter-sidebar.open')&&!document.querySelector('.settings-panel.open'))tb.classList.remove('visible')},1500)});
addEventListener('keydown',e=>{const rv=document.getElementById('readerView');if(rv.style.visibility!=='visible')return;if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextChapter()}if(e.key==='ArrowLeft'){e.preventDefault();prevChapter()}if(e.key==='Escape'){if(document.querySelector('.chapter-sidebar.open'))toggleChapterSidebar();else if(document.querySelector('.settings-panel.open'))toggleSettings();else closeReader()}if(e.key==='t'||e.key==='T')toggleChapterSidebar()});
function simulateImport(){const btn=document.querySelector('.btn-primary');btn.textContent='📂 选择文件...';btn.style.opacity='.6';setTimeout(()=>{btn.innerHTML='<span>+</span> 导入小说';btn.style.opacity='1';books.push({id:Date.now(),title:'星辰变',author:'我吃西红柿',icon:'⭐',progress:0,chapter:'尚未阅读',chapters:['第一章 流星','第二章 秦羽','第三章 潜龙大陆','第四章 星辰之力']});renderLibrary()},1200)}
renderLibrary();
</script>
