<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>10种扫描图标方案</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f2ed;
  color: #2c2824;
  padding: 40px 24px;
}
h1 { text-align: center; font-weight: 500; font-size: 1.5rem; color: #4a3f35; margin-bottom: 4px; }
.sub { text-align: center; color: #8a7a6a; font-size: .85rem; margin-bottom: 36px; }

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 24px;
  max-width: 1100px;
  margin: 0 auto;
}
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px) saturate(1.4);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 20px;
  padding: 20px 14px 16px;
  text-align: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
.card.selected { outline: 2px solid #b8895a; outline-offset: 3px; }

.preview { position: relative; min-height: 80px; display: flex; align-items: center; justify-content: center; }
.preview svg { margin: 0 auto; display: block; }

.card .label { font-size: .82rem; font-weight: 500; color: #4a3f35; margin-top: 8px; }
.card .desc { font-size: .7rem; color: #8a7a6a; line-height: 1.4; margin-top: 4px; padding: 0 4px; }

.state-tabs { display: flex; gap: 4px; justify-content: center; margin: 6px 0 2px; }
.state-tab {
  padding: 3px 10px; border-radius: 20px; font-size: .68rem; font-weight: 500;
  border: none; cursor: pointer; transition: all 0.2s ease;
  background: rgba(0,0,0,0.04); color: #8a7a6a;
}
.state-tab.active { background: #b8895a; color: #fff; }

/* 过渡 */
.idle-group { opacity: 1; transition: opacity 0.4s ease; }
.idle-group.hidden { opacity: 0; }
.scan-group { opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
.scan-group.visible { opacity: 1; }

/* ====== 通用动画（只使用 transform/opacity 等 CSS 可动画属性）====== */
@keyframes spin_cw { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes spin_ccw { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
@keyframes pulse_op { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
@keyframes pulse_scale { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.6); opacity: 0.9; } }
@keyframes breathe_scale { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

/* ====== 方案1: 经典雷达 ====== */
.s1-spin { animation: spin_cw 2.4s linear infinite; transform-origin: 12px 12px; }

/* ====== 方案2: 环形波纹 ====== */
@keyframes ring_expand { 0% { transform: scale(0.3); opacity: 0.7; } 100% { transform: scale(1.6); opacity: 0; } }
.s2-ring1 { animation: ring_expand 2s ease-out infinite; transform-origin: 12px 12px; }
.s2-ring2 { animation: ring_expand 2s ease-out 0.67s infinite; transform-origin: 12px 12px; }
.s2-ring3 { animation: ring_expand 2s ease-out 1.33s infinite; transform-origin: 12px 12px; }

/* ====== 方案3: 靶心聚焦 ====== */
.s3-pulse { animation: pulse_scale 2.4s ease-in-out infinite; transform-origin: 12px 12px; }
.s3-rotate { animation: spin_cw 4s linear infinite; transform-origin: 12px 12px; }

/* ====== 方案4: 扫描线 ====== */
@keyframes scan_line_move { 0% { transform: translateY(-6px); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(6px); opacity: 0; } }
.s4-scan { animation: scan_line_move 1.6s ease-in-out infinite; }

/* ====== 方案5: 双环对转 ====== */
.s5-cw { animation: spin_cw 2s linear infinite; transform-origin: 12px 12px; }
.s5-ccw { animation: spin_ccw 2.8s linear infinite; transform-origin: 12px 12px; }

/* ====== 方案6: 磁碟读取 ====== */
.s6-spin { animation: spin_cw 2s linear infinite; transform-origin: 12px 12px; }

/* ====== 方案7: 波浪信号 ====== */
@keyframes wave_pulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.6; } }
.s7-w1 { animation: wave_pulse 2s ease-in-out 0s infinite; }
.s7-w2 { animation: wave_pulse 2s ease-in-out 0.5s infinite; }
.s7-w3 { animation: wave_pulse 2s ease-in-out 1s infinite; }

/* ====== 方案8: 脉冲星星 ====== */
.s8-pulse { animation: pulse_scale 1.8s ease-in-out infinite; transform-origin: 12px 12px; }

/* ====== 方案9: 十字准星 ====== */
.s9-orbit { animation: spin_cw 3s linear infinite; transform-origin: 12px 12px; }
.s9-pulse { animation: pulse_op 1.6s ease-in-out infinite; }

/* ====== 方案10: 螺旋扫描 ====== */
.s10-spin { animation: spin_cw 2.2s linear infinite; transform-origin: 12px 12px; }

/* footer */
.footer { text-align: center; margin-top: 36px; color: #8a7a6a; font-size: .8rem; }
.footer button {
  margin-top: 10px; padding: 10px 28px; border: none; border-radius: 12px;
  background: #b8895a; color: #fff; font-size: .88rem; cursor: pointer;
}
.footer button:hover { opacity: 0.85; }
</style>
</head>
<body>

<h1>✦ 10 种扫描图标方案</h1>
<p class="sub">点击卡片选中 · 点击「静止」/「扫描」切换预览</p>

<div class="gallery">

<!-- ==================== 1. 经典雷达 ==================== -->
<div class="card" data-id="1" onclick="select(this)">
  <div class="preview">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" class="idle-group" data-idle="1">
      <circle cx="12" cy="12" r="9" stroke="#b8895a" stroke-width="0.4" stroke-dasharray="2 5" opacity="0.15"/>
      <circle cx="12" cy="12" r="4" fill="none" stroke="#b8895a" stroke-width="0.2" opacity="0.1"/>
      <path d="M12 12 L12 2 A10 10 0 0 1 22 12 Z" fill="#b8895a" opacity="0.04"/>
      <line x1="12" y1="12" x2="22" y2="12" stroke="#b8895a" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <circle cx="12" cy="12" r="1" fill="#b8895a" opacity="0.4"/>
    </svg>
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" class="scan-group" data-scan="1" style="display:none">
      <circle cx="12" cy="12" r="9" stroke="#b8895a" stroke-width="0.4" stroke-dasharray="2 5" opacity="0.18"/>
      <circle cx="12" cy="12" r="4" fill="none" stroke="#b8895a" stroke-width="0.2" opacity="0.1"/>
      <g class="s1-spin">
        <path d="M12 12 L12 2 A10 10 0 0 1 22 12 Z" fill="#b8895a" opacity="0.1"/>
        <line x1="12" y1="12" x2="22" y2="12" stroke="#b8895a" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
      </g>
      <circle cx="12" cy="12" r="1.2" fill="#b8895a" style="animation: pulse_op 2s ease-in-out infinite"/>
    </svg>
  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,1,'idle')">静止</button><button class="state-tab" onclick="switchState(event,1,'scan')">扫描</button></div>
  <div class="label">① 经典雷达</div>
  <div class="desc">扇形光束 + 扫描线 + 中心脉冲</div>
</div>

<!-- ==================== 2. 环形波纹 ==================== -->
<div class="card" data-id="2" onclick="select(this)">

      <circle cx="12" cy="12" r="9" stroke="#b8895a" stroke-width="0.3" opacity="0.1"/>
      <circle cx="12" cy="12" r="5" fill="none" stroke="#b8895a" stroke-width="0.5" opacity="0.15"/>
      <circle cx="12" cy="12" r="1.5" fill="#b8895a" opacity="0.35"/>
    </svg>
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" class="scan-group" data-scan="2" style="display:none">
      <circle cx="12" cy="12" r="9" stroke="#b8895a" stroke-width="0.3" opacity="0.08"/>
      <circle cx="12" cy="12" r="5" fill="none" stroke="#b8895a" stroke-width="1" class="s2-ring1"/>
      <circle cx="12" cy="12" r="5" fill="none" stroke="#b8895a" stroke-width="1" class="s2-ring2"/>
      <circle cx="12" cy="12" r="5" fill="none" stroke="#b8895a" stroke-width="1" class="s2-ring3"/>
      <circle cx="12" cy="12" r="1.5" fill="#b8895a"/>
    </svg>
  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,2,'idle')">静止</button><button class="state-tab" onclick="switchState(event,2,'scan')">扫描</button></div>
  <div class="label">② 环形波纹</div>
  <div class="desc">3层波纹交替向外扩散</div>
</div>

<!-- ==================== 3. 靶心聚焦 ==================== -->
<div class="card" data-id="3" onclick="select(this)">

      <circle cx="12" cy="12" r="9" stroke="#b8895a" stroke-width="0.4" opacity="0.1"/>

    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" class="scan-group" data-scan="3" style="display:none">
      <circle cx="12" cy="12" r="9" stroke="#b8895a" stroke-width="0.4" opacity="0.1"/>
      <g class="s3-rotate">
        <line x1="12" y1="3" x2="12" y2="5.5" stroke="#b8895a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="12" y1="18.5" x2="12" y2="21" stroke="#b8895a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="3" y1="12" x2="5.5" y2="12" stroke="#b8895a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="18.5" y1="12" x2="21" y2="12" stroke="#b8895a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      </g>
      <circle cx="12" cy="12" r="7" fill="none" stroke="#b8895a" stroke-width="0.3" opacity="0.15"/>
      <circle cx="12" cy="12" r="5" fill="none" stroke="#b8895a" stroke-width="0.4" opacity="0.2"/>
      <circle cx="12" cy="12" r="3" fill="none" stroke="#b8895a" stroke-width="0.5" opacity="0.3"/>
      <circle cx="12" cy="12" r="1.2" fill="#b8895a" class="s3-pulse"/>

  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,3,'idle')">静止</button><button class="state-tab" onclick="switchState(event,3,'scan')">扫描</button></div>
  <div class="label">③ 靶心聚焦</div>
  <div class="desc">多层同心环 + 十字旋转 + 中心脉冲</div>
</div>

      <line x1="4" y1="14" x2="18" y2="14" stroke="#b8895a" stroke-width="0.15" opacity="0.06"/>
      <line x1="4" y1="16" x2="18" y2="16" stroke="#b8895a" stroke-width="0.15" opacity="0.06"/>
    </svg>
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" class="scan-group" data-scan="4" style="display:none">
      <rect x="4" y="6" width="16" height="12" rx="2" stroke="#b8895a" stroke-width="0.4" opacity="0.15"/>
      <line x1="4" y1="8" x2="18" y2="8" stroke="#b8895a" stroke-width="0.15" opacity="0.06"/>
      <line x1="4" y1="10" x2="18" y2="10" stroke="#b8895a" stroke-width="0.15" opacity="0.06"/>
      <line x1="4" y1="14" x2="18" y2="14" stroke="#b8895a" stroke-width="0.15" opacity="0.06"/>
      <line x1="4" y1="16" x2="18" y2="16" stroke="#b8895a" stroke-width="0.15" opacity="0.06"/>
      <line x1="5" y1="12" x2="19" y2="12" stroke="#b8895a" stroke-width="2.5" stroke-linecap="round" opacity="0.7" class="s4-scan"/>

  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,4,'idle')">静止</button><button class="state-tab" onclick="switchState(event,4,'scan')">扫描</button></div>
  <div class="label">④ 扫描线</div>
  <div class="desc">方框内一条线上下往复扫描</div>
</div>

<!-- ==================== 5. 双环对转 ==================== -->
<div class="card" data-id="5" onclick="select(this)">
  <div class="preview">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" class="idle-group" data-idle="5">
      <circle cx="12" cy="12" r="9" stroke="#b8895a" stroke-width="0.4" stroke-dasharray="3 5" opacity="0.15"/>
      <circle cx="12" cy="12" r="6" stroke="#b8895a" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.15"/>
      <circle cx="12" cy="12" r="1.2" fill="#b8895a" opacity="0.35"/>
    </svg>
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" class="scan-group" data-scan="5" style="display:none">
      <circle cx="12" cy="12" r="9" stroke="#b8895a" stroke-width="0.5" stroke-dasharray="3 5" class="s5-cw" opacity="0.3"/>
      <circle cx="12" cy="12" r="6" stroke="#b8895a" stroke-width="0.5" stroke-dasharray="2 4" class="s5-ccw" opacity="0.3"/>
      <circle cx="12" cy="12" r="1.2" fill="#b8895a" style="animation: pulse_op 2s ease-in-out infinite"/>
    </svg>
  </div>
  <div class="state-tabs"><button class="state-tab active" onclick="switchState(event,5,'idle')">静止</button><button class="state-tab" onclick="switchState(event,5,'scan')">扫描</button></div>
  <div class="label">⑤ 双环对转</div>
  <div class="desc">内外虚线环反向旋转</div>
</div>

        <line x1="3" y1="12" x2="6" y2="12" stroke="#b8895a" stroke-width="0.5" opacity="0.2"/>
        <line x1="18" y1="12" x2="21" y2="12" stroke="#b8895a" stroke-width="0.5" opacity="0.2"/>

        <line x1="16" y1="16" x2="14" y2="14" stroke="#b8895a" stroke-width="0.4" opacity="0.15"/>

<!-- ==================== 8. 脉冲星星 ==================== -->
<div class="card" data-id="8" onclick="select(this)">
  <div class="preview">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" class="idle-group" data-idle="8">
      <circle cx="12" cy="12" r="9" stroke="#b8895a" stroke-width="0.3" opacity="0.08"/>
      <rect x="12" y="4" width="1" height="16" rx="0.5" fill="#b8895a" opacity="0.2"/>

      <rect x="6.4" y="6.4" width="11.2" height="1" rx="0.5" fill="#b8895a" opacity="0.15" transform="rotate(45,12,12)"/>
      <circle cx="12" cy="12" r="0.8" fill="#b8895a" opacity="0.3"/>
    </svg>
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" class="scan-group" data-scan="8" style="display:none">
      <circle cx="12" cy="12" r="9" stroke="#b8895a" stroke-width="0.3" opacity="0.08"/>
      <g class="s8-pulse">
        <rect x="12" y="4" width="1" height="16" rx="0.5" fill="#b8895a" opacity="0.5"/>
        <rect x="4" y="12" width="16" height="1" rx="0.5" fill="#b8895a" opacity="0.5"/>
        <rect x="6.4" y="6.4" width="1" height="11.2" rx="0.5" fill="#b8895a" opacity="0.35" transform="rotate(45,12,12)"/>
        <rect x="6.4" y="6.4" width="11.2" height="1" rx="0.5" fill="#b8895a" opacity="0.35" transform="rotate(45,12,12)"/>
      </g>

<div class="footer">
  <p>点击卡片选中 · 切换「静止」/「扫描」预览</p>
  <button onclick="showSelected()">显示选中编号</button>
</div>

<script>
let current = null;
function select(el) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  current = el.dataset.id;
}
function switchState(evt, id, state) {
  evt.stopPropagation();
  const card = document.querySelector(`.card[data-id="${id}"]`);
  const tabs = card.querySelectorAll('.state-tab');
  tabs.forEach(t => t.classList.remove('active'));
  evt.target.classList.add('active');
  const idle = card.querySelector(`[data-idle="${id}"]`);
  const scan = card.querySelector(`[data-scan="${id}"]`);
  if (idle) idle.style.display = state === 'idle' ? '' : 'none';
  if (scan) scan.style.display = state === 'scan' ? '' : 'none';
  if (!current) { card.classList.add('selected'); current = String(id); }
}
function showSelected() {
  if (current) alert('你选中了：第 ' + current + ' 号');
  else alert('请先点击一个卡片');
}
</script>
